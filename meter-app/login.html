<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจัดการมิเตอร์</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">
        <h2>🆔 เข้าสู่ระบบ</h2>
        <p>กรุณาพิมพ์หรือสแกนรหัสพนักงานของคุณ</p>
        
        <form onsubmit="checkLogin(event)">
            <div class="form-group">
                <label for="username">รหัสพนักงาน:</label>
                <input type="text" id="username" class="login-input" required placeholder="ใส่รหัสพนักงาน (เช่น EMP001)" autofocus>
            </div>

            <button type="submit" class="btn-submit">เข้าสู่ระบบ ➡️</button>
        </form>

        <div style="margin-top: 20px; font-size: 14px; text-align: center;">
            ยังไม่มีบัญชี? <a href="register.html" style="color: #007bff; text-decoration: none; font-weight: bold;">ลงทะเบียนที่นี่ 📝</a>
        </div>
    </div>

    <script>
        // แอบสร้างบัญชีผู้ดูแลระบบเริ่มต้นไว้ให้ในกรณีเปิดระบบครั้งแรก
        (function setupDefaultAdmin() {
            let userList = JSON.parse(localStorage.getItem('registeredUsers')) || {};
            if (!userList['admin']) {
                userList['admin'] = {
                    role: 'admin',
                    fullname: 'ผู้ดูแลระบบสูงสุด',
                    department: 'ผู้ดูแลระบบ (Admin)',
                    status: 'approved' // 🆕 แอดมินหลักได้รับอนุมัติเสมอ
                };
                localStorage.setItem('registeredUsers', JSON.stringify(userList));
            }
        })();

        function checkLogin(event) {
            event.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            let userList = JSON.parse(localStorage.getItem('registeredUsers')) || {};

            if (usernameInput in userList) {
                const userData = userList[usernameInput];
                
                // 🆕 ตรวจสอบว่าพนักงานคนนี้ได้รับการ "อนุมัติ" จาก Admin หรือยัง
                if (userData.status !== 'approved') {
                    alert('⏳ รหัสพนักงานของคุณอยู่ระหว่าง "รอนุมัติ" จากผู้ดูแลระบบ กรุณาติดต่อ Admin ครับ');
                    return; // สั่งหยุดทำงานตรงนี้ ห้ามล็อกอินเข้าหน้าแรก
                }

                // หากอนุมัติแล้ว ให้ผ่านเข้าระบบตามปกติ
                localStorage.setItem('userRole', userData.role);
                localStorage.setItem('currentUser', usernameInput);
                localStorage.setItem('currentUserFullname', userData.fullname);

                window.location.href = 'index.html';
            } else {
                alert('❌ ไม่พบรหัสพนักงานนี้ในระบบ กรุณาติดต่อหัวหน้างานหรือผู้ดูแลระบบครับ');
            }
        }
    </script>

</body>
</html>
