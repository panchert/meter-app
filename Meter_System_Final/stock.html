<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock - ระบบจัดการมิเตอร์</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<nav class="navbar">
    <div class="logo">🎛️ Meter System</div>
    <div class="menu">
        <a href="index.html">หน้าหลัก</a>
        <a href="stock.html" class="active" id="menu-stock">Stock</a>
        <a href="control.html" id="menu-control">ควบคุมเอง</a>
        <a href="history.html">ประวัติ</a>
        <a href="admin-panel.html" id="menu-admin">จัดการผู้ใช้</a>
        <a href="login.html">ออกจากระบบ</a>
    </div>
</nav>

<main class="main-content">
    <h1>📦 คลังจัดการหมายเลขมิเตอร์ (Stock)</h1>
    <p>เปิดกล้องสแกนหรือพิมพ์เฉพาะตัวเลข เพื่อบันทึกหมายเลขมิเตอร์</p>

    <div id="scanner-wrapper" style="display: none; max-width: 400px; margin: 0 auto 20px auto; background: #000; padding: 10px; border-radius: 8px;">
        <div id="reader" style="width: 100%;"></div>
        <button class="btn-off" onclick="stopScanner()" style="width: 100%; margin-top: 10px;">❌ ปิดกล้อง</button>
    </div>
    
    <div class="relay-grid" id="stockGrid"></div>
</main>

<script>
    function checkAdminPermission() {
        const role = localStorage.getItem('userRole');
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser || role !== 'admin') {
            alert('❌ ปฏิเสธการเข้าถึง');
            window.location.href = 'index.html';
        }
    }
    checkAdminPermission();

    const stockGrid = document.getElementById('stockGrid');
    let html5QrcodeScanner = null; 
    let currentScanTargetId = null; 

    // วาดการ์ด 8 ช่องดึงค่าเก่าขึ้นมาโชว์แก้ไขได้เลย
    for (let i = 1; i <= 8; i++) {
        let savedName = localStorage.getItem('meterName-' + i) || '';
        let savedUnit = localStorage.getItem('meterUnit-' + i) || '0';

        const card = document.createElement('div');
        card.className = 'relay-card';
        card.innerHTML = `
            <h3>เครื่องที่ ${i}</h3>
            <div class="form-group" style="margin-bottom: 10px;">
                <label style="font-size:12px; color:#64748b;">หมายเลขมิเตอร์ (ตัวเลขเท่านั้น):</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="input-meter-${i}" value="${savedName}" style="text-align:center; flex: 1;" inputmode="numeric" oninput="validateNumber(this)">
                    <button type="button" onclick="startScanner(${i})" style="padding: 0 10px; background: #e2e8f0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;">📷</button>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-size:12px; color:#64748b;">หน่วยปัจจุบัน (kWh):</label>
                <input type="number" id="input-unit-${i}" value="${savedUnit}" style="text-align:center;" min="0">
            </div>
            <button class="btn-confirm" id="btn-save-${i}" style="width:100%; background-color:#007bff; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;" onclick="saveMeterData(${i})">💾 บันทึกข้อมูล</button>
        `;
        stockGrid.appendChild(card);
    }

    function validateNumber(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
    }

    function saveMeterData(id) {
        const inputName = document.getElementById('input-meter-' + id).value.trim();
        const inputUnit = document.getElementById('input-unit-' + id).value;
        
        localStorage.setItem('meterName-' + id, inputName);
        localStorage.setItem('meterUnit-' + id, inputUnit);

        const saveButton = document.getElementById('btn-save-' + id);
        saveButton.innerText = "บันทึกสำเร็จ! ✔️";
        saveButton.style.backgroundColor = "#28a745"; 

        setTimeout(function() {
            saveButton.innerText = "💾 บันทึกข้อมูล";
            saveButton.style.backgroundColor = "#007bff";
        }, 1500);
    }

    function startScanner(id) {
        currentScanTargetId = id;
        document.getElementById('scanner-wrapper').style.display = 'block'; 
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
            { facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                let cleanNumber = decodedText.replace(/[^0-9]/g, '');
                document.getElementById('input-meter-' + currentScanTargetId).value = cleanNumber;
                saveMeterData(currentScanTargetId);
                stopScanner();
            },
            (errorMessage) => {}
        ).catch((err) => {
            alert("กรุณาอนุญาตให้เว็บเข้าถึงกล้องครับ");
            stopScanner();
        });
    }

    function stopScanner() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                document.getElementById('scanner-wrapper').style.display = 'none';
            }).catch(() => {
                document.getElementById('scanner-wrapper').style.display = 'none';
            });
        } else {
            document.getElementById('scanner-wrapper').style.display = 'none';
        }
    }
</script>
</body>
</html>
